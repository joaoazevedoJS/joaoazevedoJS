name: Update README Dynamic Data

on:
  schedule:
    - cron: '0 0 1 1 *' # Runs every January 1st
  workflow_dispatch: # Allow manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update years of experience
        run: |
          CAREER_START_YEAR=2019
          CURRENT_YEAR=$(date +%Y)
          YEARS=$((CURRENT_YEAR - CAREER_START_YEAR))

          sed -i "s/<!--YEARS_OF_EXPERIENCE-->.*<!--\/YEARS_OF_EXPERIENCE-->/<!--YEARS_OF_EXPERIENCE-->${YEARS}+<!--\/YEARS_OF_EXPERIENCE-->/" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "chore: update years of experience in README" && git push)
